<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="animate-glow">🚀 Share Me</h1>
    <section class="card">
      <div style="display: flex; gap: 10px;">
        <input type="text" id="usernameInput" placeholder="မိမိ ID အမည်ရိုက်ပါ">
        <button id="connectBtn" class="btn-success">Connect</button>
      </div>
      <div id="status" style="margin-top: 10px; font-size: 14px;">ချိတ်ဆက်နေသည်...</div>
    </section>
    
    <section class="card">
      <input type="text" id="targetIdInput" placeholder="ပို့မည့်သူ၏ ID ကိုရိုက်ပါ">
      <textarea id="textInput" placeholder="စာသားရိုက်ထည့်ပါ..." rows="4"></textarea>
      <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
        <button id="sendText" class="btn-primary">စာသားပို့မည်</button>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input type="file" id="fileInput" style="flex: 1;">
          <button id="sendFile" class="btn-primary">ဖိုင်ပို့မည်</button>
        </div>
      </div>
    </section>
    
    <div id="fileList"></div>
    <div id="history"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
