<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super ID Share v3</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1 class="animate-glow">🚀 Super ID Share</h1>

    <section id="login-section" class="card">
      <div class="input-group">
        <input type="text" id="usernameInput" placeholder="မိမိ ID အမည်ရိုက်ပါ (ဥပမာ- Luci)">
        <button id="connectBtn" class="btn-success">Connect လုပ်မည်</button>
      </div>
      <div id="status" class="status-bar">အခြေအနေ: ချိတ်ဆက်ရန် စောင့်ဆိုင်းနေဆဲ...</div>
    </section>

    <section id="transfer-section" class="card">
      <div class="target-box">
        <input type="text" id="targetIdInput" placeholder="ပို့မည့်သူ၏ ID ကိုရိုက်ပါ">
        <div id="statusIndicator">
          Status: <span id="targetStatus">Unknown</span>
        </div>
      </div>

      <textarea id="textInput" placeholder="ဒီနေရာမှာ စာသား သို့မဟုတ် HTML Code များ ရိုက်ထည့်ပါ..."></textarea>
      
      <div class="button-group">
        <button id="sendText" class="btn-primary">စာသားပို့မည်</button>
        <button id="clearInput" class="btn-secondary">စာသားဖျက်</button>
        <button id="clearHistory" class="btn-danger">History ဖျက်</button>
      </div>
    </section>

    <section id="file-section" class="card">
      <div class="file-upload-wrapper">
        <input type="file" id="fileInput">
        <p class="file-info">Max: 100MB (Binary Mode)</p>
      </div>
      <button id="sendFile" class="btn-primary" style="width: 100%; margin-top: 10px; background: var(--accent);">ဖိုင်ပို့မည်</button>
    </section>

    <div class="lists-container">
      <h3>📜 ရရှိထားသည့် စာသားများ</h3>
      <div id="history"></div>
      
      <h3 style="margin-top:25px;">📁 ရရှိထားသည့် ဖိုင်များ</h3>
      <div id="fileList"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
