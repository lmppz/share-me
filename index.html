<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="animate-glow">🚀 Share Me</h1>
    <section id="login-section" class="card">
      <input type="text" id="usernameInput" placeholder="မိမိ ID အမည်ရိုက်ပါ">
      <button id="connectBtn" class="btn-success">Connect လုပ်မည်</button>
      <div id="status">Server နှင့် ချိတ်ဆက်ရန် စောင့်ဆိုင်းနေဆဲ...</div>
    </section>
    <section class="card">
      <input type="text" id="targetIdInput" placeholder="ပို့မည့်သူ၏ ID ကိုရိုက်ပါ">
      <textarea id="textInput" placeholder="စာသားရိုက်ထည့်ပါ..."></textarea>
      <div class="button-group">
        <button id="sendText" class="btn-primary">စာသားပို့မည်</button>
        <input type="file" id="fileInput">
        <button id="sendFile" class="btn-primary">ဖိုင်ပို့မည်</button>
      </div>
    </section>
    <div id="history"></div>
    <div id="fileList"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
