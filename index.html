<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ID Direct Share</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 style="text-align:center; color:#38bdf8;">🚀 ID Direct Share</h1>

    <div class="card">
      <div style="display:flex; gap:10px;">
        <input type="text" id="usernameInput" placeholder="မိမိ ID အမည်ပေးပါ">
        <button id="connectBtn" class="btn-success">Connect</button>
      </div>
      <div id="status" style="font-size:0.8rem; color:#94a3b8; margin-top:5px;">ချိတ်ဆက်ရန် စောင့်ဆိုင်းနေသည်...</div>
    </div>

    <div class="card">
      <input type="text" id="targetIdInput" placeholder="လက်ခံမည့်သူ၏ ID ရိုက်ပါ">
      <textarea id="textInput" placeholder="စာသား သို့မဟုတ် Code များ ရိုက်ထည့်ပါ..."></textarea>
      <div style="display:flex; gap:10px;">
        <button id="sendText" class="btn-primary" style="flex:2;">စာပို့မည်</button>
        <button id="clearHistory" class="btn-danger" style="flex:1;">Clear All</button>
      </div>
    </div>

    <div class="card">
      <input type="file" id="fileInput">
      <p style="font-size:0.7rem; color:#64748b; margin-top:5px;">Maximum: 300MB</p>
      <button id="sendFile" class="btn-primary" style="width:100%; margin-top:10px; background:#818cf8;">ဖိုင်ပို့မည်</button>
    </div>

    <div id="history"></div>
    <div id="fileList"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
