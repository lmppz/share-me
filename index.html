<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Share – Pure P2P Text & File</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <!-- Left panel: contacts + registration -->
    <div class="contacts-panel">
        <h2>📡 Contacts</h2>
        <div class="my-id-card">
            <label>YOUR ID (register)</label>
            <div class="my-id-row">
                <input type="text" id="myIdInput" placeholder="e.g., luci" maxlength="20">
                <button id="registerBtn">Go Online</button>
            </div>
            <div class="status-badge" id="selfStatusBadge">
                <span class="dot" id="selfDot"></span>
                <span id="selfStatusText">Offline</span>
            </div>
        </div>
        <div class="contact-list" id="contactList">
            <div class="placeholder-msg">Register to see contacts</div>
        </div>
        <div class="info-note">💡 Open another tab → register another ID → start sharing</div>
    </div>

    <!-- Right panel: chat with selected contact -->
    <div class="chat-panel">
        <div class="chat-header">
            <h3 id="chatWithLabel">💬 Select a contact</h3>
            <small id="targetStatusHint"></small>
        </div>
        <div class="messages-area" id="messagesContainer">
            <div class="msg-bubble info">✨ Select a contact on the left to start chatting</div>
        </div>
        <div class="input-area">
            <textarea id="messageInput" class="text-input" rows="2" placeholder="Type your message..."></textarea>
            <div class="file-row">
                <span class="fake-file-btn" id="chooseFileBtn">📎 Choose file</span>
                <span id="fileNameSpan" class="file-name">No file</span>
                <input type="file" id="fileInput" style="display:none;">
            </div>
            <div class="flex-btns">
                <button id="sendTextBtn" class="send-btn">✉️ Send Text</button>
                <button id="sendFileBtn" class="send-btn">📁 Send File</button>
                <button id="copyReceivedTextBtn" class="send-btn copy-btn">📋 Copy only text (no timestamps)</button>
                <button id="clearChatBtn" class="send-btn clear-btn">🗑️ Clear chat</button>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast">Copied!</div>
<script src="app.js"></script>
</body>
</html>
