<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Super Share</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="main-title">
        <span class="rocket-icon">🚀</span> Super Share
    </h1>

    <section class="card">
      <div class="input-group">
        <input type="text" id="usernameInput" placeholder="မိမိ ID (ဥပမာ- Luci)">
        <button id="connectBtn" class="btn-success">Connect</button>
      </div>
      <div id="status" class="status-bar">Status: ချိတ်ဆက်ရန် စောင့်ဆိုင်းနေဆဲ...</div>
    </section>

    <section class="card">
      <div class="target-box">
        <input type="text" id="targetIdInput" placeholder="Receiver ID">
        <div id="statusIndicator">
          Status: <span id="targetStatus" class="offline">Offline</span>
        </div>
      </div>

      <textarea id="textInput" placeholder="ဒီနေရာမှာ စာသား သို့မဟုတ် Code များ ရိုက်ထည့်ပါ..." rows="8"></textarea>
      
      <div class="button-group">
        <button id="sendText" class="btn-primary">ပို့မည်</button>
        <button id="clearInput" class="btn-secondary">စာသားဖျက်</button>
        <button id="clearHistory" class="btn-danger">Clear All</button>
      </div>
    </section>

    <section class="card">
      <div class="file-upload-wrapper">
        <input type="file" id="fileInput">
      </div>
      <button id="sendFile" class="btn-primary" style="width: 100%; margin-top: 10px;">ဖိုင်ပို့မည်</button>
    </section>

    <div id="fileList"></div>
    <div id="history"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
