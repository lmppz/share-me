<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Super Share</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="main-title"><span class="rocket-icon">🚀</span> Super Share</h1>

    <section class="card">
      <div class="input-group">
        <input type="text" id="usernameInput" placeholder="မိမိ ID (ဥပမာ- Luci)">
        <button id="connectBtn" class="btn-success btn-animate">Connect</button>
      </div>
      <div id="status" class="status-bar">Status: ချိတ်ဆက်ရန် စောင့်ဆိုင်းနေဆဲ...</div>
    </section>

    <section class="card">
      <div class="receiver-section">
        <input type="text" id="targetIdInput" placeholder="Receiver ID (ပို့မည့်သူ ID)">
        <div id="statusIndicator" class="status-info">
          Status: <span id="targetStatus" class="offline">Offline</span>
        </div>
      </div>
      
      <textarea id="textInput" placeholder="စာသား သို့မဟုတ် Code များ ရိုက်ထည့်ပါ..." rows="5"></textarea>
      
      <div class="button-group">
        <button id="sendText" class="btn-primary btn-animate">ပို့မည်</button>
        <button id="clearInput" class="btn-secondary btn-animate">စာသားဖျက်</button>
      </div>
    </section>

    <section class="card">
      <div class="file-upload-wrapper">
        <input type="file" id="fileInput" multiple>
      </div>
      <div id="progressContainer" style="display: none; margin-top: 20px;">
        <div class="progress-info">
          <span id="speedDisplay">Speed: 0 KB/s</span>
          <span id="percentDisplay">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progressBar" class="progress-bar-fill"></div>
        </div>
      </div>
      <button id="sendFile" class="btn-primary btn-animate" style="width: 100%; margin-top: 15px;">ဖိုင်/ပုံ ပို့မည်</button>
    </section>

    <div id="fileList"></div>
    <div id="history"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
